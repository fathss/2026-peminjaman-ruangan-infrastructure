services:
  backend:
    image: faths/peminjaman-ruangan-backend:latest
    container_name: peminjaman-ruangan-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "5000:8080"

  frontend:
    image: faths/peminjaman-ruangan-frontend:latest
    container_name: peminjaman-ruangan-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
